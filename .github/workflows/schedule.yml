name: 钉钉考勤通报

on:
  # 仅通过 cron-job.org 的 workflow_dispatch 触发（工作日 09:30 北京时间）
  workflow_dispatch:

jobs:
  attendance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install requests
      - name: 运行考勤通报
        run: python dingtalk_attendance_bot.py
